name: 构建Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 下载FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip
          move ffmpeg-master-latest-win64-gpl ffmpeg
          echo "FFMPEG_DIR=${{ github.workspace }}\ffmpeg" >> $env:GITHUB_ENV

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 opencv-python numpy pillow requests httpx psutil pydub scipy

      - name: 构建EXE
        run: |
          python build_exe_ci.py
        env:
          PYTHONIOENCODING: utf-8
          FFMPEG_BIN: ${{ github.workspace }}\ffmpeg\bin\ffmpeg.exe
          FFPROBE_BIN: ${{ github.workspace }}\ffmpeg\bin\ffprobe.exe

      - name: 上传EXE
        uses: actions/upload-artifact@v4
        with:
          name: 抖音切片剪辑工具-Windows
          path: dist/抖音切片剪辑工具.exe
          retention-days: 30
